[manifest]
dump_lua = true
priority = 0 # run before imgui-resize.toml
version = "1.0.0"

# True or nil fix ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== =====
[[patches]]
[patches.pattern]
match_indent = true
pattern = '''oldval = event[propertyName] or false'''
payload = '''-- oldval = event[propertyName] or (properties.trueOrNil and nil or false) -- disabled this line for proper undo true or nil tracking'''
position = "at"
target = "obj/GameManager.lua"

[[patches]]
[patches.pattern]
match_indent = true
pattern = '''
imgui.Checkbox('##bool'..imguiUniqueName, numptr)
event[propertyName] = numptr[0]
'''
payload = '''
imgui.Checkbox('##bool'..imguiUniqueName, numptr)
event[propertyName] = numptr[0] or (properties.trueOrNil and nil or false)
'''
position = "at"
target = "obj/GameManager.lua"

[[patches]]
[patches.pattern]
match_indent = true
pattern = '''oldval = oldval == nil and properties.default or oldval'''
payload = '''oldval = (oldval == nil and properties.default) or (oldval ~= nil and oldval)'''
position = "at"
target = "obj/GameManager.lua"
