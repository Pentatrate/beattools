# Auto taps ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== =====
[[patches]]
[patches.pattern]
target = "obj/GameManager.lua"
pattern = '''elseif savedata.options.accessibility.taps == 'auto' then'''
position = "before"
payload = '''
elseif mods.beattools.config.tooly and (cs.name == "Game" or cs.name == "Editor") then
	if cs.cBeat >= t.beat then
		hitTap = true
		t.hit = true
		self:addToScore(t.score)
		table.insert(cs.tapTiming,0)
	end
'''
match_indent = true

# Dont save ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== ===== =====
[[patches]]
[patches.pattern]
target = "states/Results.lua"
pattern = '''sdfunc.save()'''
position = "at"
payload = '''
if not mods.beattools.config.tooly then
	sdfunc.save()
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "states/Results.lua"
