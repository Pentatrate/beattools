[[patches]]
[patches.pattern]
match_indent = true
pattern = '''log(splashes[#splashes])'''
payload = '''
-- +1 for this splash, +1 for the real totals splash
table.insert(additionalSplashes, "There are " .. (#additionalSplashes + 2) .. " beattools modded splashes! Collect them all!")
log(additionalSplashes[#additionalSplashes])

beattools.splashes.added = helpers.copy(splashes)
'''
position = "after"
target = "preload/splashes.lua"

